server:
  port: 8080

spring:
  application:
    name: springboot-jdk8-scaffold-test
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/bookhub?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema_mysql8.sql
      data-locations: classpath:sql/data_mysql8.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

bookhub:
  sync:
    gutendex-base-url: https://gutendex.com
    default-max-count: 10
    mock-enabled: true
